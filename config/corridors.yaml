# Corridor definitions for ArUco-based localization
#
# Coordinate system (per corridor):
#   Origin = start position (where user begins)
#   +x = right
#   +y = forward (direction user walks first)
#   All values in meters
#
# marker_size_m: physical side length of printed marker (190mm = 0.19m)
# Each marker: id, position (x,y) in corridor coords, facing direction
#   facing: direction the marker FACES (i.e. toward approaching user)
#   N=north(+y), S=south(-y), E=east(+x), W=west(-x)
#
# NOTE: lengths marked "measure" must be filled in after building the corridors.
# Widths are confirmed: reto=1.4m, S and U=1.2m.

marker_size_m: 0.19

corridors:

  reto:
    description: "Corredor reto"
    # Layout (top view, user walks S→N):
    #
    #   |   [ID 1]   |   <- end wall, marker faces S
    #   |            |
    #   |            |
    #   |   [ID 0]   |   <- start wall, marker faces N
    #
    width_m: 1.4
    length_m: 4.0        # measure after building
    walls:
      - [[-0.7, 0.0], [-0.7, 4.0]]   # left wall
      - [[ 0.7, 0.0], [ 0.7, 4.0]]   # right wall
    start: [0.0, 0.3]
    goal:  [0.0, 3.7]
    markers:
      - id: 0
        x: 0.0
        y: 0.0
        facing: N
        note: "start wall"
      - id: 1
        x: 0.0
        y: 4.0          # update to actual length
        facing: S
        note: "end wall"

  S_esq_dir:
    description: "Corredor S: curva esquerda depois direita"
    # Layout (top view):
    #
    #   | [13] |
    #   |      |____
    #   | [12]  [11]|
    #          |    |
    #          |[10]|  <- start
    #
    # Seg 1: going N  (x=0,        y=0..seg1)
    # Seg 2: going W  (y=seg1,     x=0..-seg2)
    # Seg 3: going N  (x=-seg2,    y=seg1..seg1+seg3)
    #
    width_m: 1.2
    seg1_len_m: 2.0      # measure after building
    seg2_len_m: 2.0      # measure after building
    seg3_len_m: 2.0      # measure after building
    walls: []            # filled in by corridor_tracker.py from seg lengths
    start: [0.0,  0.3]
    goal:  [-2.0, 4.3]   # update: [-seg2, seg1+seg3-0.3]
    markers:
      - id: 10
        x:  0.0
        y:  0.0
        facing: N
        note: "start wall"
      - id: 11
        x:  0.0
        y:  2.0          # update to seg1_len
        facing: N
        note: "right wall at first corner (before turn)"
      - id: 12
        x: -2.0          # update to -seg2_len
        y:  2.0          # update to seg1_len
        facing: E
        note: "left wall at first corner (after turn)"
      - id: 13
        x: -2.0          # update to -seg2_len
        y:  4.0          # update to seg1_len + seg3_len
        facing: S
        note: "end wall"

  U_esq:
    description: "Corredor U: ilha central, câmera fixa na abertura"
    #
    # Layout visto de cima (câmera fora, olhando para +Y):
    #
    #  câmera
    #    ↓
    #  ✕              •        y=0  (entradas)
    #  |      |¯¯¯¯¯|      |
    #  | arm1 |ilha | arm2 |
    #  | 1.2m |1.1m | 1.2m |   2.1m  (seção paralela = 3.3-1.2)
    #  |      |_____|      |
    #  |   (viragem 1.2m)  |   1.2m  (espaço de viragem)
    #  |___________________|        y=3.3 (parede do fundo)
    #  ←──────── 3.5m ──────→
    #
    # Origem: canto externo esquerdo da entrada (x=0, y=0)
    # +X: direita  |  +Y: para dentro do U
    #
    # Marcadores (na parede que ENFRENTA a câmera, ou seja, face -Y):
    #   ID 20 e 21: face inferior da ilha (y=2.1), visíveis por arm1/arm2
    #   ID 22 e 23: parede do fundo (y=3.3), visíveis por arm1/arm2
    #
    total_width_m: 3.5       # largura externa total
    total_height_m: 3.3      # altura externa total
    corridor_width_m: 1.2    # largura interna do corredor (igual em todo lugar)
    island_width_m: 1.1      # largura da ilha central (= 3.5 - 2*1.2)
    island_length_m: 2.1     # comprimento da ilha (= 3.3 - 1.2)
    turning_space_m: 1.2     # espaço de viragem no fundo (= corridor_width_m)
    wall_height_m: 1.8       # altura das paredes de papelão

    # Câmera fixa fora do U, deslocada para frente do arm1
    # Deve ficar acima de 1.8m para ver por cima da ilha
    camera_x_m: 0.6          # alinhada com centro do arm1
    camera_z_min_m: 1.9      # mínimo para linha de visão passar acima da ilha

    walls:
      - [[0.0, 0.0], [0.0, 3.3]]    # parede externa esquerda
      - [[0.0, 3.3], [3.5, 3.3]]    # parede do fundo
      - [[3.5, 3.3], [3.5, 0.0]]    # parede externa direita
      - [[1.2, 0.0], [1.2, 2.1]]    # ilha: face esquerda
      - [[1.2, 2.1], [2.3, 2.1]]    # ilha: face inferior (enfrenta câmera)
      - [[2.3, 2.1], [2.3, 0.0]]    # ilha: face direita

    start: [0.6, 0.3]    # centro do arm1, 0.3m da entrada
    goal:  [2.9, 0.3]    # centro do arm2, 0.3m da saída

    # Marcadores verticais no topo das paredes, base a 1.8m do chão.
    # Centro do marker a 1.895m (= 1.8 + 0.19/2, marker_size=0.19m).
    # Câmera acima de 1.9m vê por cima da ilha → todos visíveis.
    markers:
      - id: 20
        pos: [1.2, 2.1, 1.895]
        facing: S
        note: "topo da ilha, canto esquerdo (face inferior)"
      - id: 21
        pos: [2.3, 2.1, 1.895]
        facing: S
        note: "topo da ilha, canto direito (face inferior)"
      - id: 22
        pos: [0.6, 3.3, 1.895]
        facing: S
        note: "topo da parede do fundo, sobre arm1"
      - id: 23
        pos: [2.9, 3.3, 1.895]
        facing: S
        note: "topo da parede do fundo, sobre arm2"
