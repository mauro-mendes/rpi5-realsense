# Corridor definitions — ArUco-based localization + ground-truth tracking
#
# ESTRUTURA FÍSICA ÚNICA com parede móvel em 3 posições:
#
#   ←──────── 3.5m ─────────→
#   +────────+──────+────────+  y=0   ← câmera (fora, y=-0.55)
#   |  arm1  |      |  arm2  |
#   |  1.2m  | ilha |  1.2m  |  2.1m  (com ilha)
#   |        | 1.1m |        |
#   |        |      |        |
#   +        +──────+        +  y=2.1  ← base da ilha
#   |                        |
#   |   turning space 1.2m   |
#   |                        |
#   +───────────────+        |  y=3.3  ← parede fixa (x=0..2.3 apenas)
#                   |  arm2  |
#                   | extensão|  2.2m
#                   |  1.2m  |
#                   +────────+  y=5.5  ← parede fixa (fim reto e S)
#
# Posições da parede móvel (1.2m de largura):
#   Pos 1 → y=3.3, x=2.3..3.5 : fecha extensão   → corredor U
#   Pos 2 → x=2.3, y=2.1..3.3 : parede vertical (estende face dir da ilha) → corredor Reto
#   Pos 3 → y=2.1, x=2.3..3.5 : fecha arm2 na base da ilha                → corredor S
#
# Sistema de coordenadas (compartilhado pelos 3 corredores):
#   Origem: canto externo esquerdo da entrada (x=0, y=0)
#   +X = direita  |  +Y = para dentro do corredor  |  +Z = cima
#
# Câmera RealSense D435i: fixa em (x=1.80, y=-2.50, z=1.90)
#   x_tape=1.70m medido da parede DIREITA → x_design = 3.5-1.70 = 1.80m da parede esquerda
# ArUcos IDs 20–25: pos=[x,y,z]
#   x medido da parede DIREITA e corrigido: x_design = 3.5 - x_medido
#   y medido ao centro, z medido à base + marker_half=0.095m

marker_size_m: 0.19

# Dimensões físicas compartilhadas (referência para todos os corredores)
shared_geometry:
  total_width_m: 3.5
  corridor_width_m: 1.2
  island_width_m: 1.1
  island_length_m: 2.1
  turning_space_m: 1.2
  u_depth_m: 3.3            # profundidade até parede do fundo do U
  extension_length_m: 2.2   # extensão abaixo do U (arm2 apenas)
  total_depth_m: 5.5        # profundidade total (u_depth + extension)
  wall_height_m: 1.8
  camera_x_m: 1.80
  camera_y_m: -2.50
  camera_z_m: 1.90
  depth_scale: 1.13       # escala fixa (fallback; usado em record_trajectory.py)
  # Modelo de escala variável: scale(d) = A + B*d  onde d = profundidade Y medida
  # Calibrado com 2 pontos conhecidos do S_esq (20260630):
  #   d=2.44m (início)  → scale=1.025   (y_raw=-0.06 → y_true≈0)
  #   d=6.80m (final)   → scale=1.132   (y_raw=4.30  → y_true=5.2)
  depth_scale_A: 1.0273
  depth_scale_B: 0.003919

corridors:

  U_esq:
    description: "Corredor U — parede móvel posição 1 (fecha extensão em arm2)"
    #
    # Percurso: ✕arm1↓ (y=0→3.3) → turning → ↑arm2• (y=3.3→0)
    # Parede móvel fecha o acesso à extensão em arm2 (y=3.3, x=2.3..3.5)
    #
    total_width_m: 3.5
    u_depth_m: 3.3
    extension_length_m: 2.2
    corridor_width_m: 1.2
    island_width_m: 1.1
    island_length_m: 2.1
    turning_space_m: 1.2
    wall_height_m: 1.8
    camera_x_m: 1.2
    camera_z_min_m: 1.9

    # Paredes fixas + parede móvel na posição 1
    walls:
      - [[0.0, 0.0], [0.0, 3.3]]    # parede externa esquerda (arm1)
      - [[3.5, 0.0], [3.5, 3.3]]    # parede externa direita (arm2)
      - [[0.0, 3.3], [3.5, 3.3]]    # parede do fundo (inclui parede móvel pos 1)
      - [[1.2, 0.0], [1.2, 2.1]]    # ilha: face esquerda
      - [[1.2, 2.1], [2.3, 2.1]]    # ilha: face inferior
      - [[2.3, 2.1], [2.3, 0.0]]    # ilha: face direita

    movable_wall:
      position: 1
      segment: [[2.3, 3.3], [3.5, 3.3]]
      note: "fecha arm2 na base do U, bloqueando acesso à extensão"

    start: [0.6, 0.3]    # ✕ centro arm1, 0.3m da entrada
    goal:  [2.9, 0.3]    # •  centro arm2, 0.3m da saída

    # Marcadores no topo das paredes (base a 1.8m, centro a 1.895m)
    markers:
      - id: 20
        pos: [2.105, 2.100, 1.703]
        facing: S
        note: "topo da ilha, canto esquerdo (face inferior)"
      - id: 21
        pos: [1.280, 2.103, 1.700]
        facing: S
        note: "topo da ilha, canto direito (face inferior)"
      - id: 22
        pos: [3.420, 3.506, 1.969]
        facing: S
        note: "topo da parede do fundo, sobre arm1"
      - id: 23
        pos: [1.309, 3.293, 1.977]
        facing: S
        note: "topo da parede do fundo, sobre arm2"
      - id: 24
        pos: [1.005, 5.530, 2.249]
        facing: S
        note: "parede do fundo da extensão, lado esquerdo (arm2)"
      - id: 25
        pos: [0.466, 5.608, 2.248]
        facing: S
        note: "parede do fundo da extensão, lado direito (arm2)"
      - id: 26
        pos: [1.238, 0.060, 1.704]
        facing: S
        note: "entrada — topo parede esquerda da ilha (~2.65m da câmara; MEDIR e actualizar pos)"

  reto_esq:
    description: "Corredor reto — parede móvel posição 2 (fecha arm2, arm1 livre 5.5m)"
    #
    # Percurso: •arm1↓ direto (y=0 → y=5.5) = 5.5m em linha reta
    # Entrada: centro arm1 (x=0.6, y=0)
    # Parede móvel fecha arm2 no turning space (x=1.2, y=2.1..3.3)
    # Parede fixa no fundo: y=5.5 (fim da extensão)
    #
    total_width_m: 3.5
    u_depth_m: 3.3
    extension_length_m: 2.2
    total_depth_m: 5.5
    corridor_width_m: 1.2
    island_width_m: 1.1
    island_length_m: 2.1
    turning_space_m: 1.2
    wall_height_m: 1.8
    camera_x_m: 1.2
    camera_z_min_m: 1.9
    length_m: 5.5

    # Paredes fixas + parede móvel na posição 2
    walls:
      - [[3.5, 0.0], [3.5, 3.3]]    # parede externa direita
      - [[0.0, 0.0], [0.0, 5.5]]    # parede externa esquerda (arm1 + extensão)
      - [[3.5, 3.3], [1.2, 3.3]]    # parede do fundo direita (fixa, x=1.2..3.5)
      - [[1.2, 3.3], [1.2, 5.5]]    # parede direita da extensão
      - [[1.2, 5.5], [0.0, 5.5]]    # parede do fundo da extensão (fim)
      - [[2.3, 0.0], [2.3, 2.1]]    # ilha: face direita
      - [[2.3, 2.1], [1.2, 2.1]]    # ilha: face inferior
      - [[1.2, 2.1], [1.2, 0.0]]    # ilha: face esquerda

    movable_wall:
      position: 2
      segment: [[1.2, 2.1], [1.2, 3.3]]
      note: "parede VERTICAL em x=1.2, y=2.1..3.3 — prolonga face esquerda da ilha pelo turning space, isola arm1"

    start: [0.6, 0.3]    # • centro arm1, 0.3m da entrada
    goal:  [0.6, 5.2]    # fim da extensão, 0.3m da parede do fundo

    # Mesmos marcadores físicos do U_esq + 2 novos no fundo da extensão
    markers:
      - id: 20
        pos: [2.105, 2.100, 1.703]
        facing: S
        note: "topo da ilha, canto esquerdo (face inferior)"
      - id: 21
        pos: [1.280, 2.103, 1.700]
        facing: S
        note: "topo da ilha, canto direito (face inferior)"
      - id: 22
        pos: [3.420, 3.506, 1.969]
        facing: S
        note: "topo da parede do fundo, sobre arm1"
      - id: 23
        pos: [1.309, 3.293, 1.977]
        facing: S
        note: "topo da parede do fundo, sobre arm2"
      - id: 24
        pos: [1.005, 5.530, 2.249]
        facing: S
        note: "parede do fundo da extensão, lado esquerdo (arm2)"
      - id: 25
        pos: [0.466, 5.608, 2.248]
        facing: S
        note: "parede do fundo da extensão, lado direito (arm2)"
      - id: 26
        pos: [1.238, 0.060, 1.704]
        facing: S
        note: "entrada — topo parede esquerda da ilha (~2.65m da câmara; MEDIR e actualizar pos)"

  S_esq:
    description: "Corredor S — parede móvel posição 3 (fecha arm1 na base da ilha)"
    #
    # Percurso em 3 segmentos:
    #   Seg 1: arm2↓   y=0.0 → y=3.3  (arm2 direita, x=2.9)
    #   Seg 2: ←cross  x=2.9 → x=0.6  at y≈3.3  (crossing turning space)
    #   Seg 3: arm1+ext↓  y=3.3 → y=5.5  (arm1 esquerda + extensão)
    #
    # Parede móvel em y=2.1 fecha arm1 (x=0..1.2), forçando o percurso em S
    # Entrada: arm2 (x=2.9, y=0)
    # Final: parede fixa em y=5.5
    #
    total_width_m: 3.5
    u_depth_m: 3.3
    extension_length_m: 2.2
    total_depth_m: 5.5
    corridor_width_m: 1.2
    island_width_m: 1.1
    island_length_m: 2.1
    turning_space_m: 1.2
    wall_height_m: 1.8
    camera_x_m: 1.2
    camera_z_min_m: 1.9

    # Paredes fixas + parede móvel na posição 3
    walls:
      - [[3.5, 0.0], [3.5, 3.3]]    # parede externa direita
      - [[0.0, 0.0], [0.0, 5.5]]    # parede externa esquerda (arm1 + extensão)
      - [[3.5, 3.3], [1.2, 3.3]]    # parede do fundo direita (fixa)
      - [[1.2, 3.3], [1.2, 5.5]]    # parede direita da extensão
      - [[1.2, 5.5], [0.0, 5.5]]    # parede do fundo da extensão
      - [[2.3, 0.0], [2.3, 2.1]]    # ilha: face direita
      - [[2.3, 2.1], [1.2, 2.1]]    # ilha: face inferior
      - [[1.2, 2.1], [1.2, 0.0]]    # ilha: face esquerda

    movable_wall:
      position: 3
      segment: [[1.2, 2.1], [0.0, 2.1]]
      note: "parede HORIZONTAL em y=2.1, x=0..1.2 — fecha arm1 na base da ilha, forçando percurso em S"

    path_segments:
      - label: "arm2"
        from: [2.9, 0.0]
        to:   [2.9, 3.3]
        dir:  "+Y"
      - label: "crossing"
        from: [2.9, 3.3]
        to:   [0.6, 3.3]
        dir:  "-X"
      - label: "arm1+ext"
        from: [0.6, 3.3]
        to:   [0.6, 5.5]
        dir:  "+Y"

    start: [2.9, 0.3]    # ✕ centro arm2, 0.3m da entrada
    goal:  [0.6, 5.2]    # fim da extensão arm1, 0.3m da parede do fundo

    # Mesmos marcadores físicos do U_esq + 2 novos no fundo da extensão
    markers:
      - id: 20
        pos: [2.105, 2.100, 1.703]
        facing: S
        note: "topo da ilha, canto esquerdo (face inferior)"
      - id: 21
        pos: [1.280, 2.103, 1.700]
        facing: S
        note: "topo da ilha, canto direito (face inferior)"
      - id: 22
        pos: [3.420, 3.506, 1.969]
        facing: S
        note: "topo da parede do fundo, sobre arm1"
      - id: 23
        pos: [1.309, 3.293, 1.977]
        facing: S
        note: "topo da parede do fundo, sobre arm2"
      - id: 24
        pos: [1.005, 5.530, 2.249]
        facing: S
        note: "parede do fundo da extensão, lado esquerdo (arm2)"
      - id: 25
        pos: [0.466, 5.608, 2.248]
        facing: S
        note: "parede do fundo da extensão, lado direito (arm2)"
      - id: 26
        pos: [1.238, 0.060, 1.704]
        facing: S
        note: "entrada — topo parede esquerda da ilha (~2.65m da câmara; MEDIR e actualizar pos)"
