# Corridor definitions — ArUco-based localization + ground-truth tracking
#
# ESTRUTURA FÍSICA ÚNICA com parede móvel em 3 posições:
#
#   ←──────── 3.5m ─────────→
#   +────────+──────+────────+  y=0   ← câmera (fora, y=-0.55)
#   |  arm1  |      |  arm2  |
#   |  1.2m  | ilha |  1.2m  |  2.1m  (com ilha)
#   |        | 1.1m |        |
#   |        |      |        |
#   +        +──────+        +  y=2.1  ← base da ilha
#   |                        |
#   |   turning space 1.2m   |
#   |                        |
#   +───────────────+        |  y=3.3  ← parede fixa (x=0..2.3 apenas)
#                   |  arm2  |
#                   | extensão|  2.2m
#                   |  1.2m  |
#                   +────────+  y=5.5  ← parede fixa (fim reto e S)
#
# Posições da parede móvel (1.2m de largura):
#   Pos 1 → y=3.3, x=2.3..3.5 : fecha extensão   → corredor U
#   Pos 2 → x=2.3, y=2.1..3.3 : parede vertical (estende face dir da ilha) → corredor Reto
#   Pos 3 → y=2.1, x=2.3..3.5 : fecha arm2 na base da ilha                → corredor S
#
# Sistema de coordenadas (compartilhado pelos 3 corredores):
#   Origem: canto externo esquerdo da entrada (x=0, y=0)
#   +X = direita  |  +Y = para dentro do corredor  |  +Z = cima
#
# Câmera RealSense D435i: fixa em (x=1.2, y=-0.55, z≥1.9)
# ArUcos IDs 20–25: mesmos marcadores físicos para os 3 corredores (24-25 no fundo y=5.5)

marker_size_m: 0.19

# Dimensões físicas compartilhadas (referência para todos os corredores)
shared_geometry:
  total_width_m: 3.5
  corridor_width_m: 1.2
  island_width_m: 1.1
  island_length_m: 2.1
  turning_space_m: 1.2
  u_depth_m: 3.3            # profundidade até parede do fundo do U
  extension_length_m: 2.2   # extensão abaixo do U (arm2 apenas)
  total_depth_m: 5.5        # profundidade total (u_depth + extension)
  wall_height_m: 1.8
  camera_x_m: 1.2
  camera_z_min_m: 1.9

corridors:

  U_esq:
    description: "Corredor U — parede móvel posição 1 (fecha extensão em arm2)"
    #
    # Percurso: ✕arm1↓ (y=0→3.3) → turning → ↑arm2• (y=3.3→0)
    # Parede móvel fecha o acesso à extensão em arm2 (y=3.3, x=2.3..3.5)
    #
    total_width_m: 3.5
    u_depth_m: 3.3
    extension_length_m: 2.2
    corridor_width_m: 1.2
    island_width_m: 1.1
    island_length_m: 2.1
    turning_space_m: 1.2
    wall_height_m: 1.8
    camera_x_m: 1.2
    camera_z_min_m: 1.9

    # Paredes fixas + parede móvel na posição 1
    walls:
      - [[0.0, 0.0], [0.0, 3.3]]    # parede externa esquerda (arm1)
      - [[3.5, 0.0], [3.5, 3.3]]    # parede externa direita (arm2)
      - [[0.0, 3.3], [3.5, 3.3]]    # parede do fundo (inclui parede móvel pos 1)
      - [[1.2, 0.0], [1.2, 2.1]]    # ilha: face esquerda
      - [[1.2, 2.1], [2.3, 2.1]]    # ilha: face inferior
      - [[2.3, 2.1], [2.3, 0.0]]    # ilha: face direita

    movable_wall:
      position: 1
      segment: [[2.3, 3.3], [3.5, 3.3]]
      note: "fecha arm2 na base do U, bloqueando acesso à extensão"

    start: [0.6, 0.3]    # ✕ centro arm1, 0.3m da entrada
    goal:  [2.9, 0.3]    # •  centro arm2, 0.3m da saída

    # Marcadores no topo das paredes (base a 1.8m, centro a 1.895m)
    markers:
      - id: 20
        pos: [1.345, 2.11, 1.610]
        facing: S
        note: "topo da ilha, canto esquerdo (face inferior)"
      - id: 21
        pos: [2.220, 2.11, 1.610]
        facing: S
        note: "topo da ilha, canto direito (face inferior)"
      - id: 22
        pos: [0.105, 3.305, 1.875]
        facing: S
        note: "topo da parede do fundo, sobre arm1"
      - id: 23
        pos: [2.215, 3.305, 1.875]
        facing: S
        note: "topo da parede do fundo, sobre arm2"
      - id: 24
        pos: [2.530, 5.515, 2.200]
        facing: S
        note: "parede do fundo da extensão, lado esquerdo (arm2)"
      - id: 25
        pos: [3.375, 5.515, 2.200]
        facing: S
        note: "parede do fundo da extensão, lado direito (arm2)"

  reto_esq:
    description: "Corredor reto — parede móvel posição 2 (fecha arm1, arm2 livre 5.5m)"
    #
    # Percurso: •arm2↓ direto (y=0 → y=5.5) = 5.5m em linha reta
    # Entrada: centro arm2 (x=2.9, y=0) — mesma posição que saída do U
    # Parede móvel fecha arm1 no turning space (y≈2.7, x=0..1.2)
    # Parede fixa no fundo: y=5.5 (fim da extensão)
    #
    total_width_m: 3.5
    u_depth_m: 3.3
    extension_length_m: 2.2
    total_depth_m: 5.5
    corridor_width_m: 1.2
    island_width_m: 1.1
    island_length_m: 2.1
    turning_space_m: 1.2
    wall_height_m: 1.8
    camera_x_m: 1.2
    camera_z_min_m: 1.9
    length_m: 5.5

    # Paredes fixas + parede móvel na posição 2
    walls:
      - [[0.0, 0.0], [0.0, 3.3]]    # parede externa esquerda
      - [[3.5, 0.0], [3.5, 5.5]]    # parede externa direita (arm2 + extensão)
      - [[0.0, 3.3], [2.3, 3.3]]    # parede do fundo esquerda (fixa, x=0..2.3)
      - [[2.3, 3.3], [2.3, 5.5]]    # parede esquerda da extensão
      - [[2.3, 5.5], [3.5, 5.5]]    # parede do fundo da extensão (fim)
      - [[1.2, 0.0], [1.2, 2.1]]    # ilha: face esquerda
      - [[1.2, 2.1], [2.3, 2.1]]    # ilha: face inferior
      - [[2.3, 2.1], [2.3, 0.0]]    # ilha: face direita

    movable_wall:
      position: 2
      segment: [[2.3, 2.1], [2.3, 3.3]]
      note: "parede VERTICAL em x=2.3, y=2.1..3.3 — prolonga face direita da ilha pelo turning space, isola arm2"

    start: [2.9, 0.3]    # • centro arm2, 0.3m da entrada (= saída do U)
    goal:  [2.9, 5.2]    # fim da extensão, 0.3m da parede do fundo

    # Mesmos marcadores físicos do U_esq + 2 novos no fundo da extensão
    markers:
      - id: 20
        pos: [1.345, 2.11, 1.610]
        facing: S
        note: "topo da ilha, canto esquerdo (face inferior)"
      - id: 21
        pos: [2.220, 2.11, 1.610]
        facing: S
        note: "topo da ilha, canto direito (face inferior)"
      - id: 22
        pos: [0.105, 3.305, 1.875]
        facing: S
        note: "topo da parede do fundo, sobre arm1"
      - id: 23
        pos: [2.215, 3.305, 1.875]
        facing: S
        note: "topo da parede do fundo, sobre arm2"
      - id: 24
        pos: [2.530, 5.515, 2.200]
        facing: S
        note: "parede do fundo da extensão, lado esquerdo (arm2)"
      - id: 25
        pos: [3.375, 5.515, 2.200]
        facing: S
        note: "parede do fundo da extensão, lado direito (arm2)"

  S_esq:
    description: "Corredor S — parede móvel posição 3 (fecha arm2 na base da ilha)"
    #
    # Percurso em 3 segmentos:
    #   Seg 1: ✕arm1↓  y=0.0 → y=2.1  (1.2m alongside island)
    #   Seg 2: →cross   x=0.6 → x=2.9  at y≥2.1  (crossing turning space)
    #   Seg 3: arm2↓   y=2.1 → y=5.5  (arm2 + extensão, 1.2m wide)
    #
    # Parede móvel em y=2.1 fecha arm2 (x=2.3..3.5), forçando o percurso em S
    # Entrada: ✕ arm1 (x=0.6, y=0) — mesma entrada do U
    # Final: parede fixa em y=5.5
    #
    total_width_m: 3.5
    u_depth_m: 3.3
    extension_length_m: 2.2
    total_depth_m: 5.5
    corridor_width_m: 1.2
    island_width_m: 1.1
    island_length_m: 2.1
    turning_space_m: 1.2
    wall_height_m: 1.8
    camera_x_m: 1.2
    camera_z_min_m: 1.9

    # Paredes fixas + parede móvel na posição 3
    walls:
      - [[0.0, 0.0], [0.0, 3.3]]    # parede externa esquerda
      - [[3.5, 0.0], [3.5, 5.5]]    # parede externa direita
      - [[0.0, 3.3], [2.3, 3.3]]    # parede do fundo esquerda (fixa)
      - [[2.3, 3.3], [2.3, 5.5]]    # parede esquerda da extensão
      - [[2.3, 5.5], [3.5, 5.5]]    # parede do fundo da extensão
      - [[1.2, 0.0], [1.2, 2.1]]    # ilha: face esquerda
      - [[1.2, 2.1], [2.3, 2.1]]    # ilha: face inferior
      - [[2.3, 2.1], [2.3, 0.0]]    # ilha: face direita

    movable_wall:
      position: 3
      segment: [[2.3, 2.1], [3.5, 2.1]]
      note: "parede HORIZONTAL em y=2.1, x=2.3..3.5 — fecha arm2 na base da ilha, forçando percurso em S"

    path_segments:
      - label: "arm1"
        from: [0.6, 0.0]
        to:   [0.6, 2.1]
        dir:  "+Y"
      - label: "crossing"
        from: [0.6, 2.1]
        to:   [2.9, 2.1]
        dir:  "+X"
      - label: "arm2+ext"
        from: [2.9, 2.1]
        to:   [2.9, 5.5]
        dir:  "+Y"

    start: [0.6, 0.3]    # ✕ centro arm1, 0.3m da entrada (= entrada do U)
    goal:  [2.9, 5.2]    # fim da extensão, 0.3m da parede do fundo

    # Mesmos marcadores físicos do U_esq + 2 novos no fundo da extensão
    markers:
      - id: 20
        pos: [1.345, 2.11, 1.610]
        facing: S
        note: "topo da ilha, canto esquerdo (face inferior)"
      - id: 21
        pos: [2.220, 2.11, 1.610]
        facing: S
        note: "topo da ilha, canto direito (face inferior)"
      - id: 22
        pos: [0.105, 3.305, 1.875]
        facing: S
        note: "topo da parede do fundo, sobre arm1"
      - id: 23
        pos: [2.215, 3.305, 1.875]
        facing: S
        note: "topo da parede do fundo, sobre arm2"
      - id: 24
        pos: [2.530, 5.515, 2.200]
        facing: S
        note: "parede do fundo da extensão, lado esquerdo (arm2)"
      - id: 25
        pos: [3.375, 5.515, 2.200]
        facing: S
        note: "parede do fundo da extensão, lado direito (arm2)"
